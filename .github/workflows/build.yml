# .github/workflows/build.yml
name: Build BTC Miner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ make libixwebsocket-dev nlohmann-json3-dev
      - name: Build
        run: make
